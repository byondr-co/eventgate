# Self-hosted Redis for STAGING — eventgate-redis-staging (Singapore).
#
# Replaces the Fly-managed Upstash instance `eventgate-redis-staging` (the biggest
# line on the bill — ~$60/mo — driven by the always-on worker/beat polling under
# Upstash's per-command pricing). A flat-cost Redis Machine is ~$2/mo regardless
# of command volume.
#
# Identical to fly.redis-prod.toml except the app name. Staging mirrors prod
# (app + worker + beat) so it exercises the real async/broker path before prod.
#
# This app reuses the name of the old Upstash resource (`eventgate-redis-staging`),
# so that Upstash instance MUST be destroyed first to free the name — see the
# runbook. Safe here because Redis is not in use yet (pre-pilot).
#
# Reachable only over Fly's private 6PN network at
# `eventgate-redis-staging.internal:6379` — no public service block.
#
# Provisioning (one-time — NOT run by CI; see docs/runbook-redis-migration.md):
#   1. flyctl apps create eventgate-redis-staging --org personal
#   2. flyctl volumes create redis_data --app eventgate-redis-staging --region sin --size 1
#   3. flyctl secrets set --app eventgate-redis-staging REDIS_PASSWORD=$(openssl rand -hex 32)
#   4. flyctl deploy --config fly.redis-staging.toml --app eventgate-redis-staging
#   5. Point the staging backend at it (see runbook).

app = "eventgate-redis-staging"
primary_region = "sin"

[build]
  image = "redis:7.4-alpine"

# See fly.redis-prod.toml for the rationale on each redis-server flag.
[processes]
  redis = "sh -c 'redis-server --bind 0.0.0.0 :: --appendonly yes --dir /data --maxmemory 200mb --maxmemory-policy noeviction --requirepass $REDIS_PASSWORD'"

[mounts]
  source = "redis_data"
  destination = "/data"
  processes = ["redis"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  processes = ["redis"]

[[restart]]
  policy = "always"
  processes = ["redis"]
