app = "eventgate-backend-staging"
primary_region = "sin"

[build]

[env]
  DJANGO_SETTINGS_MODULE = "config.settings.prod"
  PORT = "8000"

# Runs once per deploy in a one-off Machine BEFORE the new release becomes
# active. If migrations fail, the deploy is rolled back and the old version
# keeps serving traffic. --noinput suppresses confirmation prompts for any
# data-loss migration; review migrations before merging.
[deploy]
  release_command = "python manage.py migrate --noinput"

# Two process groups: the web `app` (gunicorn) and the `worker` (Celery).
# When [processes] is defined, Fly ignores the Dockerfile's CMD and uses the
# commands here for each Machine, picked by process group name.
[processes]
  app = "gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile - --error-logfile -"
  worker = "celery -A config worker --loglevel=INFO --concurrency=4"

# HTTP listener is bound to the `app` process group only.
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health/"

# A VM per process group. The worker doesn't expose any port so it does NOT
# get an http_service block.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["worker"]

# Force the worker Machine to deploy with restart=always so it doesn't end up
# in standby mode (started only on demand by the app process).
[[restart]]
  policy = "always"
  processes = ["worker"]
