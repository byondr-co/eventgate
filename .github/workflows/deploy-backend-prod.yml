# Prod backend deploy.
#
# Auto-deploys on push to main (CI gates run on the PR before merge). Also supports manual dispatch + release publish.
#
# Why split from staging deploy:
#   - Staging deploys fire on every push to main → fast iteration
#   - Prod deploys also auto-deploy on main now that PR CI gates protect quality
#
# Required repo secret:
#   - FLY_API_TOKEN_PROD — separate from FLY_API_TOKEN (staging) so prod
#     can't be deployed with the staging token by accident. Provision via:
#       flyctl tokens create deploy --app eventgate-backend-prod --expiry 720h
#
# See Plan J (docs/plans/2026-05-29-plan-j-byondr-umbrella-rename.md) §4.5
# for setup.

name: Deploy backend to Fly (prod)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-prod.yml"
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: deploy-backend-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
        run: flyctl deploy --config fly.prod.toml --remote-only --app eventgate-backend-prod
