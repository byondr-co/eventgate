services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gatethres
      POSTGRES_PASSWORD: gatethres
      POSTGRES_DB: gatethres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatethres"]
      interval: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
